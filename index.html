<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeLog | Trading Journal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Trading Journal</h1>
            <div class="stats-bar">
                <div class="stat-card">
                    <span class="label">Total PnL</span>
                    <span id="total-pnl" class="value">$0.00</span>
                </div>
                <div class="stat-card">
                    <span class="label">Win Rate</span>
                    <span id="win-rate" class="value">0%</span>
                </div>
            </div>
            <div class="calendar-controls">
                <button id="prevMonth">&lt;</button>
                <h2 id="monthDisplay"></h2>
                <button id="nextMonth">&gt;</button>
            </div>
        </header>
        <div id="calendar" class="calendar-grid"></div>
    </div>
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-date-title">Date</h3>

            <!-- Existing trades list -->
            <div id="trades-list"></div>

            <!-- Add new trade -->
            <div class="add-trade-section">
                <h4>Add Trade</h4>
                <input type="number" id="pnl-input" placeholder="PnL (e.g. 500 or -200)">
                <textarea id="notes-input" placeholder="Trade notes..."></textarea>
                <button id="add-trade-btn">+ Add Trade</button>
            </div>

            <div class="modal-actions">
                <button id="close-btn">Close</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
