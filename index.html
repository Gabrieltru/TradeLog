<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeLog Trading Journal</title>
  <link rel="stylesheet" href="style-v2 (1).css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Trading Journal</h1>
      <div class="stats-bar">
        <div class="stat-card">
          <span class="label">Total PnL</span>
          <span id="total-pnl" class="value">0.00</span>
        </div>
        <div class="stat-card">
          <span class="label">Win Rate</span>
          <span id="win-rate" class="value">0%</span>
        </div>
      </div>
      <div class="calendar-controls">
        <button id="prevMonth">&lt;</button>
        <h2 id="monthDisplay"></h2>
        <button id="nextMonth">&gt;</button>
      </div>
    </header>

    <div id="calendar" class="calendar-grid"></div>

    <div id="modal" class="modal">
      <div class="modal-content">
        <h3 id="modal-date-title">Date</h3>
        <div id="trades-list"></div>
        <hr style="border:0;border-top:1px solid #334155;margin:15px 0;" />
        
        <div id="add-trade-section">
          <h4 id="add-trade-label" style="color:#94a3b8;font-size:0.9rem;margin:0 0 10px;">Add New Trade</h4>
          <input type="number" id="pnl-input" placeholder="Amount e.g. 500 or -200" />
          <textarea id="notes-input" placeholder="Trade notes..."></textarea>
          <div class="modal-actions">
            <button id="save-btn" class="save-btn">Save Entry</button>
            <button id="close-btn" class="close-btn">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script-v2 (1).js"></script>
</body>
</html>
